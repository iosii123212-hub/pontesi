<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>פונטסי - פונטים חופשיים בעברית</title>
  <link rel="icon" href="./1.ico" type="image/x-icon">
  <link rel="shortcut icon" href="./1.ico" type="image/x-icon">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script>
    let uploadedFonts = [];
    let systemFonts = [];
    let selectedFamilies = new Set();
    let currentCategory = 'all';
    let currentSearch = '';
    let currentFontSize = 40;
    let globalPreviewText = "זה אתר של פונטים בעברית";

    const fontsGrid = document.getElementById('fonts-grid');
    const emptyState = document.getElementById('empty-state');
    const loadingState = document.getElementById('loading-state');
    const globalPreviewInput = document.getElementById('global-preview-text');
    const searchInput = document.getElementById('search-input');
    const fontSizeSlider = document.getElementById('font-size-slider');
    const fontSizeVal = document.getElementById('font-size-val');
    const categoryBtns = document.querySelectorAll('.category-btn');
    const fontUploadInput = document.getElementById('font-upload');
    const dropZone = document.getElementById('drop-zone');
    const uploadCountSpan = document.getElementById('upload-count');
    const uploadTabBtn = document.querySelector('[data-category="My Uploads"]');
    const resetPreviewBtn = document.getElementById('reset-preview-text');
    const selectionBar = document.getElementById('selection-bar');
    const selectionCount = document.getElementById('selection-count');
    const clearSelectionBtn = document.getElementById('clear-selection-btn');
    const downloadZipBtn = document.getElementById('download-zip-btn');

    window.addEventListener('DOMContentLoaded', () => {
      autoDetectAndLoad();
    });

    async function autoDetectAndLoad() {
      let username = '';
      let repo = '';
      const hostname = window.location.hostname;
      const pathname = window.location.pathname;

      if (hostname.endsWith('github.io')) {
        username = hostname.split('.')[0];
        const parts = pathname.split('/').filter(Boolean);
        if (parts.length > 0) {
          repo = parts[0];
        }
      }

      if (username && repo) {
        await fetchFontsFromGitHub(username, repo);
      } else {
        renderFonts();
      }
    }

    async function fetchFontsFromGitHub(username, repo) {
      loadingState.classList.remove('hidden');
      loadingState.classList.add('flex');
      systemFonts = [];
      
      let rootFiles = [];
      let subFiles = [];

      try {
        const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/`);
        if (response.ok) rootFiles = await response.json();
      } catch (e) {}

      try {
        const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/1`);
        if (response.ok) subFiles = await response.json();
      } catch (e) {}

      const fontPromises = [];

      if (Array.isArray(rootFiles)) {
        const rootFonts = rootFiles.filter(f => ['ttf', 'otf', 'woff', 'woff2'].includes(f.name.split('.').pop().toLowerCase()));
        for (const file of rootFonts) {
          fontPromises.push(loadAndRegisterFont(file.name, `./${file.name}`, 'לשימוש מסחרי'));
        }
      }

      if (Array.isArray(subFiles)) {
        const subFonts = subFiles.filter(f => ['ttf', 'otf', 'woff', 'woff2'].includes(f.name.split('.').pop().toLowerCase()));
        for (const file of subFonts) {
          fontFolder = `./1/${file.name}`;
          fontUrl = fontFolder;
          await loadAndRegisterFont(file.name, fontUrl, 'לשימוש אישי');
        }
      }

      await Promise.all(fontFilesCheck = fontFilesPromiseAll(rootFiles, subFiles));

      loadingState.classList.remove('flex');
      loadingState.classList.add('hidden');
      renderFonts();
    }

    async function fetchFontsFromGitHub(username, repo) {
      loadingState.classList.remove('hidden');
      loadingState.classList.add('flex');
      systemFonts = [];
      
      let rootFiles = [];
      let subFiles = [];

      try {
        const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/`);
        if (response.ok) rootFiles = await response.json();
      } catch (e) {}

      try {
        const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/1`);
        if (response.ok) subFiles = await response.json();
      } catch (e) {}

      const loadPromises = [];

      if (Array.isArray(rootFiles)) {
        const rootFonts = rootFiles.filter(f => ['ttf', 'otf', 'woff', 'woff2'].includes(f.name.split('.').pop().toLowerCase()));
        for (const file of rootFonts) {
          loadImg = loadAndRegisterFont(file.name, `./${file.name}`, 'לשימוש מסחרי');
          loadPromisesArr = [];
          loadPromisesArr.push(loadImg);
          loadPromisesArrAll = Promise.allSettled(loadPromisesArr);
          loadPromises.push(loadAndRegisterFont(file.name, `./${file.name}`, 'לשימוש מסחרי'));
        }
      }

      if (Array.isArray(subFiles)) {
        const subFonts = subFiles.filter(f => ['ttf', 'otf', 'woff', 'woff2'].includes(f.name.split('.').pop().toLowerCase()));
        for (const file of subFonts) {
          loadPromises.push(loadAndRegisterFont(file.name, `./1/${file.name}`, 'לשימוש אישי'));
        }
      }

      renderFonts();

      Promise.allSettled(loadPromises).then(() => {
        loadingState.classList.remove('flex');
        loadingState.classList.add('hidden');
        renderFonts();
      });
    }

    async function loadAndRegisterFont(fileName, urlPath, licenseType) {
      const fontName = fileName.substring(0, fileName.lastIndexOf('.'));
      const ext = fileName.split('.').pop().toLowerCase();
      const localUrl = encodeURI(urlPath).replace(/'/g, '%27');
      const safeFontFamily = `fontsy-css-${Math.random().toString(36).substr(2, 9)}`;

      injectFontFaceCSS(safeFontFamily, localUrl, ext);

      systemFonts.push({
        id: safeFontFamily,
        name: safeFontFamily,
        hebrewName: fontName,
        creator: 'פונט חופשי',
        category: ext.toUpperCase().startsWith('WOFF') ? 'WOFF' : ext.toUpperCase(),
        family: `'${safeFontFamily}', system-ui, sans-serif`,
        downloadUrl: localUrl,
        license: licenseType,
        isUploaded: false
      });

      const fontFace = new FontFace(safeFontFamily, `url(${localUrl})`);
      document.fonts.add(fontFace);
      try {
        await fontFace.load();
        renderFonts();
      } catch (err) {}
    }

    function injectFontFaceCSS(safeFontName, url, ext) {
      const styleId = `style-${safeFontName}`;
      if (!document.getElementById(styleId)) {
        let format = 'truetype';
        if (ext === 'otf') format = 'opentype';
        else if (ext === 'woff') format = 'woff';
        else if (ext === 'woff2') format = 'woff2';

        const style = document.createElement('style');
        style.id = styleId;
        style.textContent = `
          @font-face {
            font-family: '${safeFontName}';
            src: url('${url}') format('${format}');
            font-display: swap;
          }
        `;
        document.head.appendChild(style);
      }
    }

    function showToast(message, icon = '✨') {
      const toast = document.getElementById('toast');
      const toastMsg = document.getElementById('toast-message');
      const toastIcon = document.getElementById('toast-icon');
      
      toastMsg.innerText = message;
      toastIcon.innerText = icon;
      
      toast.classList.remove('translate-y-20', 'opacity-0');
      toast.classList.add('translate-y-0', 'opacity-100');
      
      setTimeout(() => {
        toast.classList.remove('translate-y-0', 'opacity-100');
        toast.classList.add('translate-y-20', 'opacity-0');
      }, 3000);
    }

    function groupFontsByFamily(fontsList) {
      const groups = {};
      const suffixRegex = /\s*(מודגש[- ]נטוי|מודגש|נטוי|רגיל|בולד|דק|קל|שמן|שחור|כבד|עבה|צר|רחב|חצי[- ]מודגש|חצי|איטליק|regular|bold[- ]italic|bolditalic|bold|italic|medium|light|thin|black|heavy|condensed|oblique|semibold|demibold|extra[- ]bold|extrabold)$/i;

      fontsList.forEach(font => {
        let baseName = font.hebrewName.trim();
        let previousName;
        
        do {
          previousName = baseName;
          baseName = baseName.replace(suffixRegex, '').trim();
        } while (baseName !== previousName && baseName.length > 0);

        if (!baseName) baseName = font.hebrewName;

        if (!groups[baseName]) {
          groups[baseName] = {
            family: baseName,
            creator: font.creator,
            license: font.license,
            isUploaded: font.isUploaded,
            variations: []
          };
        }
        groups[baseName].variations.push(font);
      });
      return Object.values(groups);
    }

    function getStyleDisplayName(fullName, familyName) {
      if (fullName === familyName) return "רגיל";
      let styleName = fullName.replace(familyName, '').trim();
      return styleName || "רגיל";
    }

    function selectVariation(btn, safeName, license, category) {
      const card = btn.closest('.specimen-card');
      const editable = card.querySelector('[contenteditable]');
      editable.style.fontFamily = `'${safeName}', system-ui, sans-serif`;
      
      card.querySelectorAll('.style-chip').forEach(c => {
        c.className = "style-chip px-3 py-1 text-xs font-bold rounded-lg border border-slate-200 text-slate-500 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all";
      });
      btn.className = "style-chip px-3 py-1 text-xs font-extrabold rounded-lg border border-brand-500 bg-brand-50 text-brand-600 dark:bg-brand-900/30 dark:text-brand-300 transition-all";

      card.querySelector('.license-badge').innerText = license;
      card.querySelector('.category-badge').innerText = category;
    }

    function toggleFavorite(familyName) {
      if (favoritedFamilies.has(familyName)) {
        favoritedFamilies.delete(familyName);
      } else {
        favoritedFamilies.add(familyName);
      }
      renderFonts();
    }

    function updateSelectionUI() {
      const count = selectedFamilies.size;
      selectionCount.innerText = count;
      if (count > 0) {
        selectionBar.classList.remove('translate-y-32', 'opacity-0', 'pointer-events-none');
        selectionBar.classList.add('translate-y-0', 'opacity-100');
      } else {
        selectionBar.classList.add('translate-y-32', 'opacity-0', 'pointer-events-none');
        selectionBar.classList.remove('translate-y-0', 'opacity-100');
      }
    }

    function handleSelectionChange(checkbox, familyName) {
      if (checkbox.checked) {
        selectedFamilies.add(familyName);
      } else {
        selectedFamilies.delete(familyName);
      }
      updateSelectionUI();
    }

    clearSelectionBtn.addEventListener('click', () => {
      selectedFamilies.clear();
      document.querySelectorAll('.family-select-checkbox').forEach(cb => cb.checked = false);
      updateSelectionUI();
    });

    downloadZipBtn.addEventListener('click', async () => {
      if (selectedFamilies.size === 0) return;
      
      try {
        const zip = new JSZip();
        const allFonts = [...uploadedFonts, ...systemFonts];
        const grouped = groupFontsByFamily(allFonts);
        
        for (const familyName of selectedFamilies) {
          const group = grouped.find(g => g.family === familyName);
          if (!group) continue;
          
          for (const font of group.variations) {
            const response = await fetch(font.downloadUrl);
            const blob = await response.blob();
            const ext = font.downloadUrl.split('?')[0].split('.').pop().toLowerCase();
            zip.file(`${familyName}/${font.hebrewName}.${ext}`, blob);
          }
        }
        
        const zipBlob = await zip.generateAsync({ type: "blob" });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(zipBlob);
        link.download = `fontsy-package.zip`;
        link.style.display = 'none';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      } catch (err) {}
    });

    async function downloadFamilyZip(groupEncoded) {
      const group = JSON.parse(decodeURIComponent(groupEncoded));
      
      try {
        const zip = new JSZip();
        for (const font of group.variations) {
          const response = await fetch(font.downloadUrl);
          const blob = await response.blob();
          const ext = font.downloadUrl.split('?')[0].split('.').pop().toLowerCase();
          zip.file(`${font.hebrewName}.${ext}`, blob);
        }
        
        const zipBlob = await zip.generateAsync({ type: "blob" });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(zipBlob);
        link.download = `${group.family}.zip`;
        link.style.display = 'none';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      } catch (e) {}
    }

    function renderFonts() {
      const allFonts = [...uploadedFonts, ...systemFonts];
      
      const filteredFonts = allFonts.filter(font => {
        let matchesCategory = false;
        if (currentCategory === 'all') {
          matchesCategory = true;
        } else if (currentCategory === 'Favorites') {
          const suffixRegex = /\s*(מודגש[- ]נטוי|מודגש|נטוי|רגיל|בולד|דק|קל|שמן|שחור|כבד|עבה|צר|רחב|חצי[- ]מודגש|חצי|איטליק|regular|bold[- ]italic|bolditalic|bold|italic|medium|light|thin|black|heavy|condensed|oblique|semibold|demibold|extra[- ]bold|extrabold)$/i;
          let baseName = font.hebrewName.trim();
          let previousName;
          do {
            previousName = baseName;
            baseName = baseName.replace(suffixRegex, '').trim();
          } while (baseName !== previousName && baseName.length > 0);
          if (!baseName) baseName = font.hebrewName;
          matchesCategory = favoritedFamilies.has(baseName);
        } else if (currentCategory === 'My Uploads') {
          matchesCategory = font.isUploaded;
        } else {
          matchesCategory = (font.license === currentCategory);
        }
        
        const matchesSearch = font.hebrewName.toLowerCase().includes(currentSearch.toLowerCase());
                              
        return matchesCategory && matchesSearch;
      });

      const groupedFamilies = groupFontsByFamily(filteredFonts);

      if (groupedFamilies.length === 0) {
        fontsGrid.classList.add('hidden');
        emptyState.classList.remove('hidden');
        emptyState.classList.add('flex');
        return;
      } else {
        fontsGrid.classList.remove('hidden');
        emptyState.classList.add('hidden');
        emptyState.classList.remove('flex');
      }

      fontsGrid.innerHTML = '';
      
      groupedFamilies.forEach((group) => {
        const defaultFont = group.variations[0];
        const fontCard = document.createElement('div');
        fontCard.className = "specimen-card bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 rounded-3xl p-8 shadow-sm flex flex-col justify-between space-y-6 relative overflow-hidden cursor-pointer";
        
        const isChecked = selectedFamilies.has(group.family);
        const isFavorited = favoritedFamilies.has(group.family);
        const groupEncoded = encodeURIComponent(JSON.stringify(group));

        let styleSelectorHTML = '';
        if (group.variations.length > 1) {
          styleSelectorHTML = `
            <div class="flex flex-wrap gap-1.5 mt-3 select-none" onclick="event.stopPropagation()">
              ${group.variations.map((v, idx) => {
                const styleName = getStyleDisplayName(v.hebrewName, group.family);
                const activeClass = idx === 0 
                  ? 'border-brand-500 bg-brand-50 text-brand-600 dark:bg-brand-900/30 dark:text-brand-300' 
                  : 'border-slate-200 text-slate-500 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800';
                return `
                  <button 
                    onclick="selectVariation(this, '${v.id}', '${v.license}', '${v.category}')" 
                    class="style-chip px-3 py-1 text-xs font-bold rounded-lg border transition-all ${activeClass}"
                  >
                    ${styleName}
                  </button>
                `;
              }).join('')}
            </div>
          `;
        }

        fontCard.innerHTML = `
          <div class="space-y-6">
            <div class="flex items-start justify-between border-b border-slate-50 dark:border-slate-800 pb-4">
              <div class="flex items-center space-x-3 space-x-reverse" onclick="event.stopPropagation()">
                <input type="checkbox" class="family-select-checkbox w-5 h-5 rounded-lg border-slate-200 dark:border-slate-800 text-brand-600 focus:ring-brand-500 transition-all cursor-pointer" data-family="${group.family}" ${isChecked ? 'checked' : ''}>
                <div>
                  <h3 class="text-xl font-black text-slate-800 dark:text-white">${group.family}</h3>
                  <p class="text-xs text-slate-400 font-bold mt-1">סך הכל סגנונות: ${group.variations.length} • רישיון חופשי</p>
                </div>
              </div>
              <div class="flex items-center space-x-2 space-x-reverse" onclick="event.stopPropagation()">
                <button onclick="toggleFavorite('${group.family}')" class="p-2 bg-slate-50 dark:bg-slate-800 hover:bg-red-50 dark:hover:bg-red-950/30 rounded-xl transition-all">
                  <svg class="w-5 h-5 ${isFavorited ? 'fill-red-500 text-red-500 scale-110' : 'text-slate-400 dark:text-slate-500'} transition-transform active:scale-95" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z" />
                  </svg>
                </button>
                <span class="license-badge px-3 py-1.5 text-[10px] font-black bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 rounded-xl uppercase tracking-wider">${defaultFont.license}</span>
                <span class="category-badge px-2 py-0.5 text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">${defaultFont.category}</span>
              </div>
            </div>

            ${styleSelectorHTML}

            <div class="py-2">
              <div 
                contenteditable="true"
                style="font-family: ${defaultFont.family}; font-size: ${currentFontSize}px;" 
                class="color-font-render w-full bg-transparent focus:outline-none border-none p-0 leading-normal text-slate-900 dark:text-white outline-none"
                data-family-id="${group.family}"
                onclick="event.stopPropagation()"
              >${globalPreviewText}</div>
            </div>

            <div class="text-xs text-slate-300 dark:text-slate-700 font-bold tracking-widest pt-2 border-t border-slate-50/50 dark:border-slate-800 flex justify-between items-center select-none">
              <span style="font-family: ${defaultFont.family};" class="color-font-render">א ב ג ד ה ו ז ח ט י כ ל מ נ ס ע פ צ ק ר ש ת</span>
              <span class="text-[10px] bg-slate-50 dark:bg-slate-800 text-slate-400 dark:text-slate-500 px-2.5 py-1 rounded-lg">תווים לדוגמה</span>
            </div>
          </div>

          <div class="flex items-center justify-between pt-4 border-t border-slate-50 dark:border-slate-800" onclick="event.stopPropagation()">
            <div class="flex items-center space-x-2 space-x-reverse">
              <button onclick="toggleBold(this)" class="w-10 h-10 flex items-center justify-center text-slate-400 hover:text-slate-850 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-xl transition-all border border-transparent">
                <strong class="text-sm">B</strong>
              </button>
              <button onclick="toggleItalic(this)" class="w-10 h-10 flex items-center justify-center text-slate-400 hover:text-slate-850 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-xl transition-all border border-transparent">
                <span class="italic text-sm">I</span>
              </button>
            </div>

            <button onclick="downloadFamilyZip('${groupEncoded}')" class="flex items-center space-x-2 space-x-reverse bg-brand-50 hover:bg-brand-100 text-brand-600 dark:bg-brand-900/30 dark:hover:bg-brand-900/50 dark:text-brand-300 px-6 py-3 rounded-2xl text-xs font-black transition-all">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3" />
              </svg>
              <span>${group.variations.length > 1 ? 'הורד חבילה' : 'הורד פונט'}</span>
            </button>
          </div>
        `;

        fontCard.addEventListener('click', () => {
          openPlaygroundWithFamily(group);
        });
        
        const checkbox = fontCard.querySelector('.family-select-checkbox');
        checkbox.addEventListener('change', () => {
          handleSelectionChange(checkbox, group.family);
        });

        const editableDiv = fontCard.querySelector('[contenteditable]');
        editableDiv.addEventListener('input', (e) => {
          globalPreviewText = e.target.innerText;
          document.querySelectorAll(`[data-family-id]`).forEach(div => {
            if (div !== editableDiv) {
              div.innerText = globalPreviewText;
            }
          });
        });
        
        fontsGrid.appendChild(fontCard);
      });
    }

    globalPreviewInput.addEventListener('input', (e) => {
      globalPreviewText = e.target.value;
      const divs = fontsGrid.querySelectorAll('[contenteditable]');
      divs.forEach(div => {
        div.innerText = globalPreviewText;
      });
    });

    resetPreviewBtn.addEventListener('click', () => {
      globalPreviewText = "זה אתר של פונטים בעברית";
      globalPreviewInput.value = globalPreviewText;
      const divs = fontsGrid.querySelectorAll('[contenteditable]');
      divs.forEach(div => {
        div.innerText = globalPreviewText;
      });
    });

    fontSizeSlider.addEventListener('input', (e) => {
      currentFontSize = e.target.value;
      fontSizeVal.innerText = `${currentFontSize}px`;
      const divs = fontsGrid.querySelectorAll('[contenteditable]');
      divs.forEach(div => {
        div.style.fontSize = `${currentFontSize}px`;
      });
    });

    searchInput.addEventListener('input', (e) => {
      currentSearch = e.target.value;
      renderFonts();
    });

    categoryBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        categoryBtns.forEach(b => {
          b.className = "category-btn px-5 py-2.5 rounded-xl text-xs font-bold transition-all bg-slate-50 dark:bg-slate-850 hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-300";
        });
        
        btn.className = "category-btn px-5 py-2.5 rounded-xl text-xs font-bold transition-all bg-brand-500 text-white shadow-md shadow-brand-500/10";
        
        currentCategory = btn.getAttribute('data-category');
        renderFonts();
      });
    });

    function toggleBold(btn) {
      const card = btn.closest('.specimen-card');
      const editable = card.querySelector('[contenteditable]');
      if (editable.style.fontWeight === 'bold') {
        editable.style.fontWeight = 'normal';
        btn.classList.remove('text-brand-600', 'bg-brand-50');
        btn.classList.add('text-slate-400');
      } else {
        editable.style.fontWeight = 'bold';
        btn.classList.add('text-brand-600', 'bg-brand-50');
        btn.classList.remove('text-slate-400');
      }
    }

    function toggleItalic(btn) {
      const card = btn.closest('.specimen-card');
      const editable = card.querySelector('[contenteditable]');
      if (editable.style.fontStyle === 'italic') {
        editable.style.fontStyle = 'normal';
        btn.classList.remove('text-brand-600', 'bg-brand-50');
        btn.classList.add('text-slate-400');
      } else {
        editable.style.fontStyle = 'italic';
        btn.classList.add('text-brand-600', 'bg-brand-50');
        btn.classList.remove('text-slate-400');
      }
    }

    function handleFontFile(file) {
      if (!file) return;
      
      const validExtensions = ['ttf', 'otf', 'woff', 'woff2'];
      const fileExtension = file.name.split('.').pop().toLowerCase();
      
      if (!validExtensions.includes(fileExtension)) {
        showToast("נא להעלות קובץ פונט בלבד", "⚠️");
        return;
      }

      const reader = new FileReader();
      reader.onload = function(e) {
        const fontData = e.target.result;
        const fontBaseName = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;
        const cleanFontFamily = `uploaded-font-${Date.now()}`;

        const fontFace = new FontFace(cleanFontFamily, fontData);
        fontFace.load().then((loadedFace) => {
          document.fonts.add(loadedFace);
          
          const blob = new Blob([fontData], { type: 'font/ttf' });
          const objectUrl = URL.createObjectURL(blob);

          const newFont = {
            id: cleanFontFamily,
            name: cleanFontFamily,
            hebrewName: fontBaseName,
            creator: 'העלאה אישית',
            category: 'My Uploads',
            family: `'${cleanFontFamily}', system-ui, sans-serif`,
            downloadUrl: objectUrl,
            originalFileName: file.name,
            license: 'שימוש מקומי',
            isUploaded: true
          };

          uploadedFonts.unshift(newFont);
          uploadCountSpan.innerText = uploadedFonts.length;
          uploadTabBtn.classList.remove('hidden');
          uploadTabBtn.click();
          
          showToast(`הפונט "${fontBaseName}" נטען בהצלחה!`, "🎉");
        }).catch(() => {
          showToast("שגיאה בפענוח הקובץ", "❌");
        });
      };
      
      reader.readAsArrayBuffer(file);
    }

    fontUploadInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      handleFontFile(file);
    });

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('border-brand-500', 'bg-brand-50/10');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('border-brand-500', 'bg-brand-50/10');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('border-brand-500', 'bg-brand-50/10');
      const file = e.dataTransfer.files[0];
      handleFontFile(file);
    });

    dropZone.addEventListener('click', () => {
      fontUploadInput.click();
    });

    themeToggleBtn.addEventListener('click', () => {
      if (document.documentElement.classList.contains('dark')) {
        document.documentElement.classList.remove('dark');
        localStorage.setItem('fontsy_theme', 'light');
      } else {
        document.documentElement.classList.add('dark');
        localStorage.setItem('fontsy_theme', 'dark');
      }
    });

    function openPlaygroundWithFamily(group) {
      catalogView.classList.add('hidden');
      playgroundView.classList.remove('hidden');
      selectionBar.classList.add('hidden');

      activeLayers = [];
      selectedLayerId = null;
      canvasLayersContainer.innerHTML = '';
      
      setCanvasBgColor('#ffffff');

      const defaultFont = group.variations[0];
      addLayerToCanvas(defaultFont, "זה אתר של פונטים בעברית");
    }

    function addLayerToCanvas(fontItem, textStr = "טקסט מעוצב") {
      const layerId = `layer-${Date.now()}-${Math.random().toString(36).substr(2, 5)}`;
      
      const layerObj = {
        id: layerId,
        fontId: fontItem.id,
        familyName: fontItem.hebrewName,
        family: fontItem.family,
        text: textStr,
        fontSize: 48,
        letterSpacing: 0,
        rotation: 0,
        bold: false,
        italic: false,
        colorType: 'normal',
        colorValue: '#1e293b',
        weirdClass: '',
        x: 80,
        y: 120 + (activeLayers.length * 70),
        license: fontItem.license,
        category: fontItem.category
      };

      activeLayers.push(layerObj);
      renderLayersInCanvas();
      selectLayer(layerId);
    }

    function renderLayersInCanvas() {
      const container = document.getElementById('canvas-layers-container');
      container.innerHTML = '';

      activeLayers.forEach(layer => {
        const div = document.createElement('div');
        div.id = layer.id;
        div.className = `absolute cursor-move select-none p-3 border-2 ${selectedLayerId === layer.id ? 'border-brand-500/50 bg-brand-500/5' : 'border-transparent'} rounded-2xl transition-shadow duration-150`;
        div.style.left = `${layer.x}px`;
        div.style.top = `${layer.y}px`;

        const innerSpan = document.createElement('span');
        innerSpan.className = `color-font-render block whitespace-nowrap leading-none ${layer.weirdClass}`;
        innerSpan.innerText = layer.text;
        innerSpan.style.fontFamily = layer.family;
        innerSpan.style.fontSize = `${layer.fontSize}px`;
        innerSpan.style.letterSpacing = `${layer.letterSpacing}px`;
        innerSpan.style.transform = `rotate(${layer.rotation}deg)`;
        innerSpan.style.fontWeight = layer.bold ? 'bold' : 'normal';
        innerSpan.style.fontStyle = layer.italic ? 'italic' : 'normal';
        
        if (layer.colorType === 'normal') {
          innerSpan.style.color = layer.colorValue;
          innerSpan.style.background = 'none';
          innerSpan.style.webkitBackgroundClip = 'unset';
          innerSpan.style.webkitTextFillColor = 'unset';
        }

        div.appendChild(innerSpan);
        container.appendChild(div);

        div.addEventListener('mousedown', (e) => startDrag(e, layer.id));
        div.addEventListener('touchstart', (e) => startDrag(e, layer.id), { passive: true });
        
        div.addEventListener('click', (e) => {
          e.stopPropagation();
          selectLayer(layer.id);
        });
      });
    }

    let dragData = null;

    function startDrag(e, layerId) {
      selectLayer(layerId);
      const layer = activeLayers.find(l => l.id === layerId);
      if (!layer) return;

      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;

      dragData = {
        layerId: layerId,
        startX: clientX,
        startY: clientY,
        origX: layer.x,
        origY: layer.y
      };

      document.addEventListener('mousemove', onDrag);
      document.addEventListener('touchmove', onDrag, { passive: false });
      document.addEventListener('mouseup', endDrag);
      document.addEventListener('touchend', endDrag);
    }

    function onDrag(e) {
      if (!dragData) return;
      
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;

      const dx = clientX - dragData.startX;
      const dy = clientY - dragData.startY;

      const layer = activeLayers.find(l => l.id === dragData.layerId);
      if (layer) {
        layer.x = dragData.origX + dx;
        layer.y = dragData.origY + dy;
        
        const el = document.getElementById(layer.id);
        if (el) {
          el.style.left = `${layer.x}px`;
          el.style.top = `${layer.y}px`;
        }
      }
    }

    function endDrag() {
      dragData = null;
      document.removeEventListener('mousemove', onDrag);
      document.removeEventListener('touchmove', onDrag);
      document.removeEventListener('mouseup', endDrag);
      document.removeEventListener('touchend', endDrag);
    }

    function selectLayer(layerId) {
      selectedLayerId = layerId;
      const layer = activeLayers.find(l => l.id === layerId);
      
      if (!layer) {
        noLayerSelectedEl.classList.remove('hidden');
        layerControlsEl.classList.add('hidden');
        return;
      }

      noLayerSelectedEl.classList.add('hidden');
      layerControlsEl.classList.remove('hidden');

      layerTextInput.value = layer.text;
      layerSizeSlider.value = layer.fontSize;
      layerSizeVal.innerText = `${layer.fontSize}px`;
      layerSpacingSlider.value = layer.letterSpacing;
      layerRotationSlider.value = layer.rotation;

      if (layer.bold) {
        layerBoldBtn.className = "py-2.5 rounded-xl border border-brand-500 bg-brand-50 text-xs font-black text-brand-600 transition-all";
      } else {
        layerBoldBtn.className = "py-2.5 rounded-xl border border-slate-200 dark:border-slate-800 text-xs font-black text-slate-500 hover:bg-slate-50 transition-all";
      }

      if (layer.italic) {
        layerItalicBtn.className = "py-2.5 rounded-xl border border-brand-500 bg-brand-50 text-xs font-black text-brand-600 transition-all";
      } else {
        layerItalicBtn.className = "py-2.5 rounded-xl border border-slate-200 dark:border-slate-800 text-xs font-black text-slate-500 hover:bg-slate-50 transition-all";
      }

      renderLayersInCanvas();
    }

    layerTextInput.addEventListener('input', (e) => {
      if (!selectedLayerId) return;
      const layer = activeLayers.find(l => l.id === selectedLayerId);
      if (layer) {
        layer.text = e.target.value;
        renderLayersInCanvas();
      }
    });

    layerSizeSlider.addEventListener('input', (e) => {
      if (!selectedLayerId) return;
      const layer = activeLayers.find(l => l.id === selectedLayerId);
      if (layer) {
        layer.fontSize = parseInt(e.target.value);
        layerSizeVal.innerText = `${layer.fontSize}px`;
        renderLayersInCanvas();
      }
    });

    layerSpacingSlider.addEventListener('input', (e) => {
      if (!selectedLayerId) return;
      const layer = activeLayers.find(l => l.id === selectedLayerId);
      if (layer) {
        layer.letterSpacing = parseInt(e.target.value);
        renderLayersInCanvas();
      }
    });

    layerRotationSlider.addEventListener('input', (e) => {
      if (!selectedLayerId) return;
      const layer = activeLayers.find(l => l.id === selectedLayerId);
      if (layer) {
        layer.rotation = parseInt(e.target.value);
        renderLayersInCanvas();
      }
    });

    layerBoldBtn.addEventListener('click', () => {
      if (!selectedLayerId) return;
      const layer = activeLayers.find(l => l.id === selectedLayerId);
      if (layer) {
        layer.bold = !layer.bold;
        selectLayer(selectedLayerId);
      }
    });

    layerItalicBtn.addEventListener('click', () => {
      if (!selectedLayerId) return;
      const layer = activeLayers.find(l => l.id === selectedLayerId);
      if (layer) {
        layer.italic = !layer.italic;
        selectLayer(selectedLayerId);
      }
    });

    deleteLayerBtn.addEventListener('click', () => {
      if (!selectedLayerId) return;
      activeLayers = activeLayers.filter(l => l.id !== selectedLayerId);
      selectedLayerId = null;
      selectLayer(null);
    });

    function setLayerNormalColor(colorHex) {
      if (!selectedLayerId) return;
      const layer = activeLayers.find(l => l.id === selectedLayerId);
      if (layer) {
        layer.colorType = 'normal';
        layer.colorValue = colorHex;
        layer.weirdClass = '';
        renderLayersInCanvas();
      }
    }

    function setLayerWeirdStyle(weirdClassName) {
      if (!selectedLayerId) return;
      const layer = activeLayers.find(l => l.id === selectedLayerId);
      if (layer) {
        layer.colorType = 'weird';
        layer.weirdClass = weirdClassName;
        renderLayersInCanvas();
      }
    }

    function setCanvasBgColor(colorHex) {
      designCanvas.className = "relative w-full h-[600px] border border-slate-100 dark:border-slate-800 rounded-3xl shadow-lg overflow-hidden select-none";
      designCanvas.style.backgroundColor = colorHex;
      designCanvas.style.background = '';
    }

    function setCanvasBgWeird(weirdClassName) {
      designCanvas.style.backgroundColor = '';
      designCanvas.style.background = '';
      designCanvas.className = `relative w-full h-[600px] border border-slate-100 dark:border-slate-800 rounded-3xl shadow-lg overflow-hidden select-none ${weirdClassName}`;
    }

    backToCatalogBtn.addEventListener('click', () => {
      playgroundView.classList.add('hidden');
      catalogView.classList.remove('hidden');
      updateSelectionUI();
    });

    addTextLayerBtn.addEventListener('click', () => {
      modalFontsList.innerHTML = '';
      const allFonts = [...uploadedFonts, ...systemFonts];
      
      allFonts.forEach(font => {
        const btn = document.createElement('button');
        btn.className = "w-full text-right px-4 py-3 rounded-2xl hover:bg-slate-50 dark:hover:bg-slate-850 border border-slate-100 dark:border-slate-800 text-sm font-bold text-slate-700 dark:text-slate-200 flex items-center justify-between";
        btn.onclick = () => {
          addLayerToCanvas(font);
          addLayerModal.classList.add('hidden');
        };
        btn.innerHTML = `
          <span>${font.hebrewName}</span>
          <span class="text-[10px] text-brand-600 bg-brand-50 dark:bg-brand-900/40 dark:text-brand-300 px-2 py-0.5 rounded-lg">${font.category}</span>
        `;
        modalFontsList.appendChild(btn);
      });

      addLayerModal.classList.remove('hidden');
      addLayerModal.classList.add('flex');
    });

    closeModalBtn.addEventListener('click', () => {
      addLayerModal.classList.add('hidden');
    });

    addLayerModal.addEventListener('click', (e) => {
      if (e.target === addLayerModal) {
        addLayerModal.classList.add('hidden');
      }
    });

    designCanvas.addEventListener('click', () => {
      selectLayer(null);
    });
  </script>
</body>
</html>
