<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>פונטסי - פונטים חופשיים בעברית</title>
  <link rel="icon" href="1.ico" type="image/x-icon">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f5f3ff',
              100: '#ede9fe',
              500: '#8b5cf6',
              600: '#7c3aed',
              700: '#6d28d9',
              900: '#4c1d95',
            }
          }
        }
      }
    }
  </script>
  <style>
    .font-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .font-card:hover { transform: translateY(-4px); }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen dark:bg-slate-950 dark:text-slate-100">

  <div id="toast" class="fixed bottom-6 right-6 z-50 transform translate-y-20 opacity-0 transition-all duration-300 pointer-events-none">
    <div class="bg-slate-900 text-white dark:bg-white dark:text-slate-900 px-6 py-4 rounded-2xl shadow-xl flex items-center space-x-3 space-x-reverse border border-slate-800 dark:border-slate-200">
      <span id="toast-icon">✨</span>
      <p id="toast-message" class="text-sm font-medium"></p>
    </div>
  </div>

  <header class="sticky top-0 z-40 bg-white/85 dark:bg-slate-950/85 backdrop-blur-md border-b border-slate-100 dark:border-slate-900">
    <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
      <div class="flex items-center space-x-3 space-x-reverse">
        <div class="w-10 h-10 bg-gradient-to-tr from-brand-500 to-indigo-600 rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-lg">פ</div>
        <div>
          <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-brand-600 to-indigo-600 dark:from-brand-400 dark:to-indigo-400">פונטסי</h1>
          <p class="text-xs text-slate-500 dark:text-slate-400">סריקה אוטומטית של פונטים חופשיים</p>
        </div>
      </div>
      <div class="flex items-center space-x-3 space-x-reverse">
        <label for="font-upload" class="cursor-pointer px-4 py-2.5 rounded-xl bg-brand-50 hover:bg-brand-100 text-brand-600 dark:bg-brand-950/40 dark:text-brand-300 text-sm font-semibold shadow-sm flex items-center space-x-2 space-x-reverse">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5m-13.5-9L12 3m0 0 4.5 4.5M12 3v13.5" /></svg>
          <span class="hidden sm:inline">העלה פונט</span>
        </label>
        <input type="file" id="font-upload" accept=".ttf,.otf" class="hidden">
        <button id="theme-toggle" class="p-2.5 rounded-xl border border-slate-200 dark:border-slate-800">
          <svg id="theme-icon" class="w-5 h-5 text-slate-700 dark:text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-8">
    <div id="fonts-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
    <div id="loading-state" class="hidden flex flex-col items-center py-20"><div class="w-10 h-10 border-4 border-brand-500 border-t-transparent rounded-full animate-spin"></div></div>
  </main>

  <script>
    const fontsGrid = document.getElementById('fonts-grid');
    const loadingState = document.getElementById('loading-state');

    window.addEventListener('DOMContentLoaded', async () => {
      const hostname = window.location.hostname;
      const pathname = window.location.pathname;
      if (hostname.endsWith('github.io')) {
        const username = hostname.split('.')[0];
        const repo = pathname.split('/').filter(Boolean)[0];
        if (username && repo) await fetchFonts(username, repo);
      }
    });

    async function fetchFonts(username, repo) {
      loadingState.classList.remove('hidden');
      try {
        const res = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/`);
        const files = await res.json();
        for (const file of files.filter(f => f.name.match(/\.(ttf|otf)$/i))) {
          const fontName = file.name.replace(/\.(ttf|otf)$/i, '');
          const face = new FontFace(fontName, `url(${file.download_url})`);
          await face.load();
          document.fonts.add(face);
          createCard(fontName, file.download_url, file.name.split('.').pop().toUpperCase());
        }
      } catch (e) {} finally { loadingState.classList.add('hidden'); }
    }

    function createCard(name, url, ext) {
      const div = document.createElement('div');
      div.className = "font-card bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 rounded-2xl p-6 shadow-sm";
      div.innerHTML = `
        <div class="flex justify-between items-start mb-4">
          <h3 class="font-bold text-lg">${name}</h3>
          <span class="text-[10px] font-bold bg-brand-50 text-brand-600 px-2 py-1 rounded-lg">${ext}</span>
        </div>
        <textarea style="font-family:'${name}'" class="w-full text-3xl bg-transparent border-none focus:ring-0 resize-none">דוגמה לטקסט</textarea>
        <button onclick="window.open('${url}')" class="mt-4 w-full bg-slate-900 dark:bg-white text-white dark:text-slate-900 py-2 rounded-xl text-sm font-bold">הורד פונט</button>
      `;
      fontsGrid.appendChild(div);
    }

    document.getElementById('theme-toggle').addEventListener('click', () => {
      document.documentElement.classList.toggle('dark');
    });
  </script>
</body>
</html>
